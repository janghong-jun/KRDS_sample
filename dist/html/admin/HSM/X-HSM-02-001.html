<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no,maximum-scale=1">
<title>Hi-Coaching Admin</title>
<link rel="icon" type="image/png" sizes="512x512" href="../../../resources/admin/images/favicon_512.png">
<link rel="icon" type="image/png" sizes="192x192" href="../../../../resources/admin/images/favicon_192.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../../../resources/admin/images/favicon_32.png">
<link rel="stylesheet" href="../../../resources/admin/css/admin.css" type="text/css">
<script type="text/javascript" src="../../../resources/admin/js/jquery-2.2.4.min.js"></script>
<script type="text/javascript" src="../../../resources/admin/js/ui.global.js"></script>
<script type="text/javascript" src="../../../resources/admin/js/ui.common.js"></script>
  </head>
  <body>
    <div class="wrap login">
      <section class="admin-login-inner">
        <div class="login-top">
          <h1>하이코칭 관리자 시스템</h1>
          <div class="links">
            <div class="logo">
              <a href="#"><span class="hide">Hi-Coaching</span></a>
            </div>
          </div>
        </div>
        <div class="login-box">
          <div class="frm-area">
            <input type="text" placeholder="아이디 입력" aria-label="아이디 입력">
          </div>
          <p class="msg error-info">아이디 입력 을(를) 입력해 주세요.</p>
          <div class="frm-area">
            <input type="password" placeholder="비밀번호 입력" aria-label="비밀번호 입력">
          </div>
          <p class="msg error-info">비밀번호 입력 을(를) 입력해 주세요.</p>
          <div class="login-btn">
            <button type="button" class="btn primary">
              <span>로그인</span>
            </button>
          </div>
          <ul class="list-dot mgt24">
            <li>본 시스템은 내부 관리자용으로 인가된 관리자만 사용할 수 있습니다.</li>
            <li>비밀번호 5회이상 오류시 접근이 제한됩니다.(비밀번호 오류시 관리담당자에게 문의하시기 바랍니다.)</li>
          </ul>
          <span class="ip">IP Adress : XXX.XXX.XXX.XXX</span>
        </div>
      </section>
    </div>
  </body>
</html>
