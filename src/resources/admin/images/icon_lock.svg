<svg width="24" height="24" viewBox="0 0 24 24"
     fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 몸통 부분: 연한 노랑 배경 + 진한 노랑 테두리 -->
  <rect x="4" y="10" width="16" height="10" rx="2" ry="2"
        fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
  <!-- 고리 부분: 진한 노랑 -->
  <path d="M8 10V7C8 4.79 9.79 3 12 3C14.21 3 16 4.79 16 7V10"
        stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- 열쇠 구멍: 진한 노랑 -->
  <circle cx="12" cy="15" r="1.3" fill="#1a1a1a"/>
  <path d="M12 16.3V18.5" stroke="#1a1a1a"
        stroke-width="1.6" stroke-linecap="round"/>
</svg>
