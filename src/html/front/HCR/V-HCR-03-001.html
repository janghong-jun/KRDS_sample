<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../../components/_meta.html" -->
    <title>Hi-Coaching</title>
    <!-- 공통 css -->
    <!--# include virtual="../../../components/_css.html" -->
    <!-- 공통 script -->
    <!--# include virtual="../../../components/_script.html" -->
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../../components/_skip.html" -->

      <!--# include virtual="../../../components/_masthead.html" -->
      <!--# include virtual="../../../components/_header.html" -->

      <!-- Container -->
      <main id="container">
        <div class="inner">
          <button
            type="button"
            class="krds-btn open-modal"
            data-target="V-HCR-03-001"
          >
            모달 열기
          </button>
        </div>
      </main>

      <!-- footer -->
      <!--# include virtual="../../../components/_footer.html" -->
    </div>
  </body>
  <section
    id="V-HCR-03-001"
    class="krds-modal fade"
    role="dialog"
    aria-labelledby="tit_V-HCR-03-001"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <!-- modal title -->
        <div class="modal-header">
          <h2 id="tit_V-HCR-03-001" class="modal-title">신고하기</h2>
        </div>
        <!-- //modal title -->
        <!-- modal contents -->
        <div class="modal-conts">
          <div class="conts-area">
            <div class="krds-table-wrap row mob-col mob-scroll">
              <table class="tbl">
                <caption>
                  신고하기 양식에 대한 표로 신고 유형, 신고 내용으로
                  구성되어있다.
                </caption>
                <colgroup>
                  <col style="width: 12.8rem" />
                  <col />
                </colgroup>
                <tbody>
                  <tr>
                    <th scope="row">
                      <label for="select01" class="krds-label">
                        신고 유형
                        <i class="required" aria-hidden="true"></i>
                        <span class="sr-only">필수 항목</span>
                      </label>
                    </th>
                    <td>
                      <select
                        class="krds-form-select small completed"
                        title="역할선택"
                        id="select01"
                      >
                        <option value="">사유 선택</option>
                        <option value="">부적절한 콘텐츠</option>
                        <option value="">부적절한 내용</option>
                        <option value="">허위정보 기재</option>
                        <option value="">기타</option>
                      </select>
                    </td>
                  </tr>
                  <tr>
                    <th scope="row">
                      <label for="textarea01" class="krds-label">
                        신고 내용
                        <i class="required" aria-hidden="true"></i>
                        <span class="sr-only">필수 항목</span>
                      </label>
                    </th>
                    <td>
                      <textarea
                        type="text"
                        class="krds-input medium"
                        id="textarea01"
                        placeholder="최소 10자 이상 입력해주세요."
                        style="height: 13.6rem"
                      ></textarea>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <p class="info-text">
              신고 결과는 ‘마이코칭 > 내 프로필’ 화면에서 확인하실 수 있습니다.
            </p>
          </div>
        </div>
        <!-- //modal contents -->
        <!-- modal btn -->
        <div class="modal-btn btn-wrap">
          <button type="button" class="krds-btn medium primary">
            신고하기
          </button>
        </div>
        <!-- //modal btn -->
        <!-- close button -->
        <button
          type="button"
          class="krds-btn medium icon btn-close close-modal"
        >
          <span class="sr-only">닫기</span>
          <i class="svg-icon ico-popup-close"></i>
        </button>
        <!-- //close button -->
      </div>
    </div>
    <div class="modal-back"></div>
  </section>
  <script>
    krds_modal.openModal('V-HCR-03-001');
  </script>
</html>
