<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../../components/_meta.html" -->
    <title>커뮤니티게시판 등록 | 학습공동체 | Hi-Coaching</title>
    <!-- 공통 css -->
    <!--# include virtual="../../../components/_css.html" -->
    <!-- 공통 script -->
    <!--# include virtual="../../../components/_script.html" -->
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../../components/_skip.html" -->

      <!--# include virtual="../../../components/_masthead.html" -->
      <!--# include virtual="../../../components/_header.html" -->

      <!-- Container -->
      <main id="container">
        <div class="inner in-between">
          <!-- 학습공동체 사이드 메뉴 -->
          <nav class="krds-side-navigation" id="lnb">
            <h2 class="lnb-tit">학습공동체</h2>
            <!-- lnb-list -->
            <ul class="lnb-list">
              <li class="lnb-item">
                <a href="#" class="lnb-btn">협업공간</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">실행나눔</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">연구지원</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">학습공동체채널정보</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn selected">커뮤니티게시판</a>
              </li>
            </ul>
            <!-- //lnb-list -->
          </nav>
          <!-- //학습공동체 사이드 메뉴 -->

          <div class="contents" id="contents">
            <!-- Page Title -->
            <div class="page-title-wrap">
              <h3 class="h-tit">커뮤니티 게시판</h3>
            </div>

            <div class="board-wrap">
              <div class="board-write">
                <div class="krds-table-wrap write">
                  <table class="tbl">
                    <caption>
                      커뮤니티 게시판 등록에 대한 표로 참고사항, 카테고리, 제목,
                      내용, 첨부파일로 구성되어있다.
                    </caption>
                    <colgroup>
                      <col style="width: 15rem" />
                      <col />
                    </colgroup>
                    <tbody>
                      <tr>
                        <td colspan="2">
                          <div class="info-wrap">
                            <strong class="info-title">작성시 참고사항</strong>
                            <p class="info-text">
                              주제의 성격에 맞는 게시물을 작성하여 주시기
                              바랍니다.
                            </p>
                            <p class="info-text">
                              부적절한 게시물이나 주제에 적합하지 않은 게시물은
                              관리자가 숨김 또는 삭제 처리할 수 있습니다.
                            </p>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          카테고리선택
                          <i class="required" aria-hidden="true"></i>
                          <span class="sr-only">필수 항목</span>
                        </th>
                        <td class="al">
                          <div class="filter-tab">
                            <div class="filter-item">
                              <input
                                type="radio"
                                class="radio"
                                name="rdo_chip"
                                id="rdo_chip_1"
                                checked
                              />
                              <label for="rdo_chip_1">전체보기</label>
                            </div>
                            <div class="filter-item">
                              <input
                                type="radio"
                                class="radio"
                                name="rdo_chip"
                                id="rdo_chip_2"
                              />
                              <label for="rdo_chip_2">자유</label>
                            </div>
                            <div class="filter-item">
                              <input
                                type="radio"
                                class="radio"
                                name="rdo_chip"
                                id="rdo_chip_3"
                              />
                              <label for="rdo_chip_3">주제1</label>
                            </div>
                            <div class="filter-item">
                              <input
                                type="radio"
                                class="radio"
                                name="rdo_chip"
                                id="rdo_chip_4"
                              />
                              <label for="rdo_chip_4">주제2</label>
                            </div>
                            <div class="filter-item">
                              <input
                                type="radio"
                                class="radio"
                                name="rdo_chip"
                                id="rdo_chip_5"
                              />
                              <label for="rdo_chip_5">주제3</label>
                            </div>
                            <div class="filter-item">
                              <input
                                type="radio"
                                class="radio"
                                name="rdo_chip"
                                id="rdo_chip_6"
                              />
                              <label for="rdo_chip_6">주제4</label>
                            </div>
                            <div class="filter-item">
                              <input
                                type="radio"
                                class="radio"
                                name="rdo_chip"
                                id="rdo_chip_7"
                              />
                              <label for="rdo_chip_7">주제5</label>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_title" class="krds-label">
                            제목
                          </label>
                        </th>
                        <td class="al">
                          <input
                            type="text"
                            class="krds-input"
                            id="input_title"
                            placeholder="제목을 입력해주세요(최대 30자)"
                          />
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_cont" class="krds-label">
                            내용
                          </label>
                        </th>
                        <td class="al">
                          <textarea
                            class="krds-input"
                            id="input_cont"
                            placeholder="내용을 입력해주세요(최대 0000자)"
                          ></textarea>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="file-upload" class="krds-label">
                            첨부파일
                          </label>
                        </th>
                        <td>
                          <div class="file-box">
                            <ul class="file-list">
                              <li>
                                <span class="file-name">
                                  <i class="svg-icon ico-pdf"></i>
                                  <span>실행나눔 사례1.pdf</span>
                                </span>
                                <button type="button" class="krds-btn icon">
                                  <i class="svg-icon ico-delete-fill2"></i>
                                  <span class="sr-only">삭제</span>
                                </button>
                              </li>
                              <li>
                                <span class="file-name">
                                  <i class="svg-icon ico-pdf"></i>
                                  <span>실행나눔 사례1.pdf</span>
                                </span>
                                <button type="button" class="krds-btn icon">
                                  <i class="svg-icon ico-delete-fill2"></i>
                                  <span class="sr-only">삭제</span>
                                </button>
                              </li>
                            </ul>
                            <div class="file-box-btn-wrap">
                              <input type="file" id="file-upload" hidden="" />
                              <label
                                for="file-upload"
                                class="krds-btn tertiary medium"
                              >
                                찾아보기
                              </label>
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="krds-btns-wrap right">
                <a href="#" class="krds-btn xlarge primary">등록</a>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- footer -->
      <!--# include virtual="../../../components/_footer.html" -->
    </div>
  </body>
</html>
