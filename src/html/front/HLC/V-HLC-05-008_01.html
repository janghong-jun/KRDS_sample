  <body>
    <div id="wrap">
      <!--# include virtual="../../../components/_skip.html" -->

      <!--# include virtual="../../../components/_masthead.html" -->
      <!--# include virtual="../../../components/_header.html" -->

      <!-- Container -->
      <main id="container">
        <div class="inner">
          <button type="button" class="krds-btn open-modal" data-target="V-HLC-05-008_01">모달 열기</button>
        </div>
      </main>

      <!--# include virtual="../../../components/_footer.html" -->
    </div>
  </body>
  <section id="V-HLC-05-008_01" class="krds-modal fade" role="dialog" aria-labelledby="tit_V-HLC-05-008_01">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <!-- modal title -->
        <div class="modal-header">
          <h2 id="tit_V-HLC-05-008_01" class="modal-title">새 글 작성</h2>
        </div>
        <!-- //modal title -->
        <!-- modal contents -->
        <div class="modal-conts">
          <div class="conts-area">
            <div class="krds-table-wrap row mob-col mob-scroll">
              <table class="tbl">
                <caption>
                  새 글 등록에 대한 표로 제목, 내용, 첨부파일로 구성되어있다.
                </caption>
                <colgroup>
                  <col style="width: 13.5rem" />
                  <col />
                </colgroup>
                <tbody>
                  <tr>
                    <th scope="row">
                      <label for="input_title" class="krds-label"> 제목 </label>
                    </th>
                    <td class="al">
                      <input type="text" class="krds-input small" id="input_title" placeholder="제목을 입력하여 주세요.(최대 30자)" />
                    </td>
                  </tr>
                  <tr>
                    <th scope="row">
                      <label for="input_cont" class="krds-label"> 내용 </label>
                    </th>
                    <td class="al">
                      <textarea class="krds-input" id="input_cont" placeholder="내용을 입력해주세요"></textarea>
                    </td>
                  </tr>
                  <tr>
                    <th scope="row">
                      <label for="file-upload" class="krds-label">첨부파일</label>
                    </th>
                    <td>
                      <div class="file-box">
                        <!-- <ul class="file-list">
                          <li>
                            <span class="file-name">
                              <i class="svg-icon ico-pdf" aria-hidden="true"></i>
                              <span>파일명.pdf</span>
                            </span>
                            <button type="button" class="krds-btn icon">
                              <i class="svg-icon ico-delete-fill2" aria-hidden="true"></i>
                              <span class="sr-only">삭제</span>
                            </button>
                          </li>
                        </ul> -->
                        <div class="file-box-btn-wrap">
                          <input type="file" id="file-upload" hidden />
                          <label for="file-upload" class="krds-btn tertiary medium">찾아보기</label>
                        </div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <!-- //modal contents -->
        <!-- modal btn -->
        <div class="modal-btn btn-wrap">
          <button type="button" class="krds-btn medium primary">등록</button>
        </div>
        <!-- //modal btn -->
        <!-- close button -->
        <button type="button" class="krds-btn medium icon btn-close close-modal">
          <span class="sr-only">닫기</span>
          <i class="svg-icon ico-popup-close" aria-hidden="true"></i>
        </button>
        <!-- //close button -->
      </div>
    </div>
    <div class="modal-back"></div>
  </section>
  <script>
    krds_modal.openModal('V-HLC-05-008_01');
