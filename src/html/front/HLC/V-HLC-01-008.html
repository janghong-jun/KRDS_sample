<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../../components/_meta.html" -->
    <title>자유공유 등록 | 협업공간 | 학습공동체 | Hi-Coaching</title>
    <!-- 공통 css -->
    <!--# include virtual="../../../components/_css.html" -->
    <!-- 공통 script -->
    <!--# include virtual="../../../components/_script.html" -->
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../../components/_skip.html" -->

      <!--# include virtual="../../../components/_masthead.html" -->
      <!--# include virtual="../../../components/_header.html" -->

      <!-- Container -->
      <main id="container">
        <div class="inner in-between">
          <!-- 학습공동체 사이드 메뉴 -->
          <nav class="krds-side-navigation" id="lnb">
            <h2 class="lnb-tit">학습공동체</h2>
            <!-- lnb-list -->
            <ul class="lnb-list">
              <li class="lnb-item">
                <a href="#" class="lnb-btn selected">협업공간</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">실행나눔</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">연구지원</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">학습공동체채널정보</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">커뮤니티게시판</a>
              </li>
            </ul>
            <!-- //lnb-list -->
          </nav>
          <!-- //학습공동체 사이드 메뉴 -->

          <div class="contents" id="contents">
            <!-- Page Title -->
            <div class="page-title-wrap justify-between">
              <h3 class="h-tit">자료공유</h3>
            </div>

            <div class="todo-wrap">
              <div class="board-wrap">
                <div class="board-write">
                  <div class="krds-table-wrap write">
                    <table class="tbl">
                      <caption>
                        자료공유 등록에 대한 표로 등록자, 제목, 내용, 첨부파일로
                        구성되어있다.
                      </caption>
                      <colgroup>
                        <col style="width: 15rem" />
                        <col />
                      </colgroup>
                      <tbody>
                        <tr>
                          <th class="ac" scope="row">등록자</th>
                          <td class="al">홍길동</td>
                        </tr>
                        <tr>
                          <th class="ac" scope="row">
                            <label for="input_name" class="krds-label">
                              제목
                              <i class="required" aria-hidden="true"></i>
                              <span class="sr-only">필수 항목</span>
                            </label>
                          </th>
                          <td class="al">
                            <input
                              type="text"
                              class="krds-input"
                              id="input_name"
                              placeholder="제목을 입력해주세요(최대 30자)"
                            />
                          </td>
                        </tr>
                        <tr>
                          <th class="ac" scope="row">
                            <label for="input_cont" class="krds-label">
                              내용
                              <i class="required" aria-hidden="true"></i>
                              <span class="sr-only">필수 항목</span>
                            </label>
                          </th>
                          <td class="al">
                            <textarea
                              class="krds-input"
                              id="input_cont"
                              placeholder="내용을 입력해주세요"
                            ></textarea>
                          </td>
                        </tr>
                        <tr>
                          <th class="ac" scope="row">
                            <label for="file-upload" class="krds-label"
                              >첨부파일</label
                            >
                          </th>
                          <td>
                            <div class="file-box">
                              <ul class="file-list">
                                <li>
                                  <span class="file-name">
                                    <i class="svg-icon ico-pdf"></i>
                                    <span>실행나눔 사례1.pdf</span>
                                  </span>
                                  <button type="button" class="krds-btn icon">
                                    <i class="svg-icon ico-delete-fill2"></i>
                                    <span class="sr-only">삭제</span>
                                  </button>
                                </li>
                                <li>
                                  <span class="file-name">
                                    <i class="svg-icon ico-pdf"></i>
                                    <span>실행나눔 사례1.pdf</span>
                                  </span>
                                  <button type="button" class="krds-btn icon">
                                    <i class="svg-icon ico-delete-fill2"></i>
                                    <span class="sr-only">삭제</span>
                                  </button>
                                </li>
                              </ul>
                              <div class="file-box-btn-wrap">
                                <input type="file" id="file-upload" hidden="" />
                                <label
                                  for="file-upload"
                                  class="krds-btn tertiary medium"
                                >
                                  찾아보기
                                </label>
                              </div>
                            </div>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
                <div class="krds-btns-wrap right">
                  <a href="#" class="krds-btn xlarge primary">등록</a>
                </div>
              </div>
              <div class="todo-box">
                <div class="todo-top">
                  <h4 class="todo-title">To-Do</h4>
                  <button type="button" class="krds-btn icon">
                    <span class="sr-only">일정등록</span>
                    <i class="svg-icon ico-plus"></i>
                  </button>
                </div>
                <div class="todo-body">
                  <ul class="todo-list">
                    <li class="checked">
                      <button type="button">
                        <i class="svg-icon ico-calendar"></i>
                        <span class="date">
                          <span>12월 24일 오후 2:00~</span>
                          <span>12월 25일 오전 10:00</span>
                        </span>
                        <strong class="title">[미팅] 신규기능 확인</strong>
                      </button>
                    </li>
                    <li>
                      <button type="button">
                        <i class="svg-icon ico-calendar"></i>
                        <span class="date">
                          <span>12월 24일 오후 2:00~</span>
                          <span>12월 25일 오전 10:00</span>
                        </span>
                        <strong class="title">[미팅] 신규기능 확인</strong>
                      </button>
                    </li>
                    <li>
                      <button type="button">
                        <i class="svg-icon ico-calendar"></i>
                        <span class="date">
                          <span>12월 24일 오후 2:00~</span>
                          <span>12월 25일 오전 10:00</span>
                        </span>
                        <strong class="title">[미팅] 신규기능 확인</strong>
                      </button>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- footer -->
      <!--# include virtual="../../../components/_footer.html" -->
    </div>
  </body>
  <section
    id="modal_sample_01"
    class="krds-modal fade system-modal"
    role="dialog"
    aria-labelledby="tit_modal_sample_01"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <!-- modal contents -->
        <div class="modal-conts">
          <div class="conts-area" id="tit_modal_sample_01">
            $협업공간명$에 참여신청 하시겠습니까?"
          </div>
        </div>
        <!-- //modal contents -->
        <!-- modal btn -->
        <div class="modal-btn btn-wrap">
          <button type="button" class="krds-btn medium tertiary close-modal">
            취소
          </button>
          <button
            type="button"
            class="krds-btn medium primary close-modal open-modal"
            data-target="modal_sample_02"
          >
            확인
          </button>
        </div>
        <!-- //modal btn -->
      </div>
    </div>
    <div class="modal-back"></div>
  </section>
  <section
    id="modal_sample_02"
    class="krds-modal fade system-modal"
    role="dialog"
    aria-labelledby="tit_modal_sample_02"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <!-- modal contents -->
        <div class="modal-conts">
          <div class="conts-area" id="tit_modal_sample_02">
            참여신청이 완료 되었습니다. 개설자 승인 후 협업공간에 참여하실 수
            있습니다.
          </div>
        </div>
        <!-- //modal contents -->
        <!-- modal btn -->
        <div class="modal-btn btn-wrap">
          <button type="button" class="krds-btn medium tertiary close-modal">
            취소
          </button>
          <button type="button" class="krds-btn medium primary close-modal">
            확인
          </button>
        </div>
        <!-- //modal btn -->
      </div>
    </div>
    <div class="modal-back"></div>
  </section>
</html>
