      <!-- Container -->

        <div class="inner in-between">
          <!-- 학습공동체 사이드 메뉴 -->

                <a href="#" class="lnb-btn">협업공간</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn selected">실행나눔</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">연구지원</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">학습공동체채널정보</a>

                <a href="#" class="lnb-btn">수석교사</a>
              </li>

                <a href="#" class="lnb-btn">교사연구년제</a>
              </li>
            </ul>
            <!-- //lnb-list -->
          </nav>
          <!-- //학습공동체 사이드 메뉴 -->

          <div class="contents" id="contents">
            <!-- breadcrumb -->
            <nav class="krds-breadcrumb-wrap" aria-label="현재 경로" id="breadcrumb">
              <ol class="breadcrumb">
                <li class="home"><a href="#" class="txt">홈</a></li>
                <li><a href="#" class="txt">학습공동체</a></li>
                <li><a href="#" class="txt">실행나눔</a></li>
                <li><a href="#" class="txt">실행나눔 등록</a></li>
              </ol>
            </nav>
            <!-- /breadcrumb -->
            <!-- Page Title -->
            <div class="page-title-wrap">
              <h3 class="h-tit">실행나눔</h3>
            </div>
            <div class="board-wrap">
              <div class="board-write">
                <div class="krds-table-wrap write">
                  <table class="tbl">
                    <caption>
                      실행나눔 등록에 대한 표로 등록자, 제목, 내용, 썸네일, 첨부파일로 구성되어있다.
                    </caption>
                    <colgroup>
                      <col style="width: 15rem" />
                      <col />
                    </colgroup>
                    <tbody>
                      <tr>
                        <th class="ac" scope="row">등록자</th>
                        <td class="al">홍길동</td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="category_select">
                            교원/역량 구분
                            <i class="required" aria-hidden="true"></i>
                            <span class="sr-only">필수 항목</span>
                          </label>
                        </th>
                        <td>
                          <div class="krds-form-wrap">
                            <select class="krds-form-select" id="category_select">
                              <option value="">교원 구분 선택</option>
                              <option value="">교사</option>
                              <option value="">수석교사</option>
                              <option value="">교감</option>
                              <option value="">교장</option>
                              <option value="">교육전문직원</option>
                            </select>
                            <select class="krds-form-select" aria-label="역량군 선택">
                              <option value="">역량군 선택</option>
                            </select>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_name" class="krds-label">
                            제목
                            <i class="required" aria-hidden="true"></i>
                            <span class="sr-only">필수 항목</span>
                          </label>
                        </th>
                        <td class="al">
                          <input type="text" class="krds-input" id="input_name" placeholder="제목을 입력해주세요(최대 30자)" />
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_cont" class="krds-label">
                            내용
                            <i class="required" aria-hidden="true"></i>
                            <span class="sr-only">필수 항목</span>
                          </label>
                        </th>
                        <td class="al">
                          <textarea class="krds-input" id="input_cont" placeholder="내용을 입력해주세요"></textarea>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="file-upload" class="krds-label">썸네일</label>
                        </th>
                        <td>
                          <div class="file-box">
                            <div class="file-info">
                              <p>썸네일 파일을 등록해주세요</p>
                              <strong>이미지 파일만 등록가능 합니다.(권장 : 000*000)</strong>
                            </div>
                            <div class="file-box-btn-wrap">
                              <input type="file" id="file-upload" hidden />
                              <label for="file-upload" class="krds-btn tertiary medium">찾아보기</label>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="file-upload02" class="krds-label">첨부파일</label>
                        </th>
                        <td>
                          <div class="file-box">
                            <div class="file-box-btn-wrap">
                              <input type="file" id="file-upload02" hidden />
                              <label for="file-upload02" class="krds-btn tertiary medium">찾아보기</label>
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="krds-btns-wrap right">
                <a href="#" class="krds-btn xlarge primary">등록</a>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!--# include virtual="../../../components/_footer.html" -->
    </div>
  </body>
  <!--# include virtual="../../../components/_chatbot.html" -->
</html>
