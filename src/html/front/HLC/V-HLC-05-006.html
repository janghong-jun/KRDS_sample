          <div class="contents" id="contents">
            <!-- breadcrumb -->
            <nav class="krds-breadcrumb-wrap" aria-label="현재 경로" id="breadcrumb">
              <ol class="breadcrumb">
                <li class="home"><a href="#" class="txt">홈</a></li>
                <li><a href="#" class="txt">학습공동체</a></li>
                <li><a href="#" class="txt">수업공동체</a></li>
                <li><a href="#" class="txt">수업나눔</a></li>
                <li><a href="#" class="txt">수업나눔 등록</a></li>
              </ol>
            </nav>
            <!-- /breadcrumb -->
            <!-- Page Title -->
            <div class="page-title-wrap">
              <h3 class="h-tit">수업나눔 게시판</h3>
            </div>
            <div class="board-wrap">
              <div class="board-write">
                <div class="krds-table-wrap write">
                  <table class="tbl">
                    <caption>
                      수업나눔 게시판 등록에 대한 표로 등록자, 제목, 구분, 공개수업 대상, 일정, 시간, 내용, 첨부파일로 구성되어있다.
                    </caption>
                    <colgroup>
                      <col style="width: 15rem" />
                      <col />
                    </colgroup>
                    <tbody>
                      <tr>
                        <th class="ac" scope="row">등록자</th>
                        <td>김역량</td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_title" class="krds-label">
                            제목
                            <i class="required" aria-hidden="true"></i>
                            <span class="sr-only">필수 항목</span>
                          </label>
                        </th>
                        <td class="al">
                          <input type="text" class="krds-input" id="input_title" placeholder="제목을 입력하여 주세요.(최대 30자)" />
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          구분
                          <i class="required" aria-hidden="true"></i>
                          <span class="sr-only">필수 항목</span>
                        </th>
                        <td>
                          <div class="krds-check-area">
                            <div class="krds-form-check">
                              <input type="checkbox" id="chk_1" />
                              <label for="chk_1">일반</label>
                            </div>
                            <div class="krds-form-check">
                              <input type="checkbox" id="chk_2" />
                              <label for="chk_2">공개수업</label>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          공개수업 대상
                          <i class="required" aria-hidden="true"></i>
                          <span class="sr-only">필수 항목</span>
                        </th>
                        <td>
                          <div class="krds-check-area">
                            <div class="krds-form-check">
                              <input type="radio" name="rdo_1" id="rdo_1" />
                              <label for="rdo_1">나의 학교</label>
                            </div>
                            <div class="krds-form-check">
                              <input type="radio" name="rdo_1" id="rdo_2" />
                              <label for="rdo_2">나의 지역</label>
                            </div>
                            <div class="krds-form-check">
                              <input type="radio" name="rdo_1" id="rdo_3" />
                              <label for="rdo_3">경기도 전체</label>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          일정
                          <i class="required" aria-hidden="true"></i>
                          <span class="sr-only">필수 항목</span>
                        </th>
                        <td>
                          <div class="date-setting">
                            <div class="item">
                              <div class="time">
                                <select class="krds-form-select small" aria-label="년도 선택">
                                  <option>년도</option>
                                </select>
                                <select class="krds-form-select small" aria-label="월 선택">
                                  <option>월</option>
                                </select>
                                <select class="krds-form-select small" aria-label="일 선택">
                                  <option>일</option>
                                </select>
                              </div>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          시간
                          <i class="required" aria-hidden="true"></i>
                          <span class="sr-only">필수 항목</span>
                        </th>
                        <td>
                          <div class="date-setting">
                            <div class="item">
                              <div class="time">
                                <select class="krds-form-select small completed" aria-label="시작 시간 선택">
                                  <option>00</option>
                                </select>
                                <span>시</span>
                                <select class="krds-form-select small completed" aria-label="시작 분 선택">
                                  <option>00</option>
                                </select>
                                <span>분</span>
                                <span>~</span>
                                <select class="krds-form-select small completed" aria-label="종료 시간 선택">
                                  <option>00</option>
                                </select>
                                <span>시</span>
                                <select class="krds-form-select small completed" aria-label="종료 분 선택">
                                  <option>00</option>
                                </select>
                                <span>분</span>
                              </div>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_cont" class="krds-label">
                            내용
                            <i class="required" aria-hidden="true"></i>
                            <span class="sr-only">필수 항목</span>
                          </label>
                        </th>
                        <td class="al">
                          <textarea class="krds-input" id="input_cont" placeholder="내용을 입력해주세요"></textarea>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="file-upload" class="krds-label">첨부파일</label>
                        </th>
                        <td>
                          <div class="file-box">
                            <!-- <ul class="file-list">
                          <li>
                            <span class="file-name">
                              <i class="svg-icon ico-pdf"></i>
                              <span>파일명.pdf</span>
                            </span>
                            <button type="button" class="krds-btn icon">
                              <i class="svg-icon ico-delete-fill2"></i>
                              <span class="sr-only">삭제</span>
                            </button>
                          </li>
                        </ul> -->
                            <div class="file-box-btn-wrap">
                              <input type="file" id="file-upload" hidden />
                              <label for="file-upload" class="krds-btn tertiary medium">찾아보기</label>
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="krds-btns-wrap between">
                <div>
                  <a href="#" class="krds-btn xlarge tertiary">취소</a>
                </div>
                <div class="right">
                  <button type="button" class="krds-btn xlarge tertiary">삭제</button>
                  <button type="button" class="krds-btn xlarge primary">수정</button>
                  <!-- <button type="button" class="krds-btn xlarge primary">등록</button> -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!--# include virtual="../../../components/_footer.html" -->
    </div>
  </body>
</html>
