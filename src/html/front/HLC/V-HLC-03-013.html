<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../../components/_meta.html" -->
    <title>연구지원 등록 | 연구지원 | 학습공동체 | Hi-Coaching</title>
    <!-- 공통 css -->
    <!--# include virtual="../../../components/_css.html" -->
    <!-- 공통 script -->
    <!--# include virtual="../../../components/_script.html" -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        GNB.setSelected({ depth1: 3, depth2: 2 });
      });
    </script>
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../../components/_skip.html" -->

      <!--# include virtual="../../../components/_masthead.html" -->
      <!--# include virtual="../../../components/_header.html" -->

      <!-- Container -->
      <main id="container">
        <div class="inner in-between">
          <!-- 학습공동체 사이드 메뉴 -->
          <nav class="krds-side-navigation" id="lnb">
            <h2 class="lnb-tit">학습공동체</h2>
            <!-- lnb-list -->
            <ul class="lnb-list">
              <li class="lnb-item">
                <a href="#" class="lnb-btn">협업공간</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">실행나눔</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn selected">연구지원</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">학습공동체채널정보</a>
              </li>
              <li class="lnb-item">
                <a href="#" class="lnb-btn">커뮤니티게시판</a>
              </li>
            </ul>
            <!-- //lnb-list -->
          </nav>
          <!-- //학습공동체 사이드 메뉴 -->

          <div class="contents" id="contents">
            <!-- Page Title -->
            <div class="page-title-wrap">
              <h3 class="h-tit">연구지원</h3>
            </div>
            <div class="board-wrap">
              <div class="board-write">
                <div class="krds-table-wrap write">
                  <h4 class="krds-table-title">연구지원 등록 요청</h4>
                  <table class="tbl">
                    <caption>
                      연구지원 등록에 대한 표로 요청자, 연구지원명, 연구지원소개, 썸네일, 연구지원 주제, 연구지원 키워드로 구성되어있다.
                    </caption>
                    <colgroup>
                      <col style="width: 15rem" />
                      <col />
                    </colgroup>
                    <tbody>
                      <tr>
                        <th class="ac" scope="row">요청자</th>
                        <td class="al">홍길동</td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_name" class="krds-label">
                            연구지원명
                            <i class="required" aria-hidden="true"></i>
                            <span class="sr-only">필수 항목</span>
                          </label>
                        </th>
                        <td class="al">
                          <input type="text" class="krds-input" id="input_name" placeholder="연구지원명을 입력해주세요(최대 20자)" />
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_cont" class="krds-label">
                            연구지원소개
                            <i class="required" aria-hidden="true"></i>
                            <span class="sr-only">필수 항목</span>
                          </label>
                        </th>
                        <td class="al">
                          <textarea class="krds-input" id="input_cont" placeholder="연구지원 소개 내용을 입력해주세요 (최대 50자)"></textarea>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="file-upload" class="krds-label">썸네일</label>
                        </th>
                        <td>
                          <div class="file-box">
                            <div class="file-info">
                              <strong> 이미지 파일만 등록가능 합니다.(권장 : 000*000) </strong>
                            </div>
                            <div class="file-box-btn-wrap">
                              <input type="file" id="file-upload" hidden="" />
                              <label for="file-upload" class="krds-btn tertiary medium"> 찾아보기 </label>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="file-upload" class="krds-label">썸네일</label>
                        </th>
                        <td>
                          <div class="file-box">
                            <ul class="file-list">
                              <li>
                                <span class="file-name">
                                  <i class="svg-icon ico-pdf"></i>
                                  <span>실행나눔 사례1.pdf</span>
                                </span>
                                <button type="button" class="krds-btn icon">
                                  <i class="svg-icon ico-delete-fill2"></i>
                                  <span class="sr-only">삭제</span>
                                </button>
                              </li>
                            </ul>
                            <div class="file-box-btn-wrap">
                              <input type="file" id="file-upload" hidden="" />
                              <label for="file-upload" class="krds-btn tertiary medium"> 찾아보기 </label>
                            </div>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_topic" class="krds-label"> 연구지원 주제 </label>
                        </th>
                        <td class="al">
                          <input type="text" class="krds-input" id="input_topic" placeholder="연구지원 주제를 입력해주세요(최대 30자)" />
                        </td>
                      </tr>
                      <tr>
                        <th class="ac" scope="row">
                          <label for="input_keyword" class="krds-label"> 연구지원 키워드 </label>
                        </th>
                        <td class="al">
                          <input type="text" class="krds-input" id="input_keyword" placeholder="연구지원과 관련된 키워드를 입력해주세요(최대 10개 키워드1, 키워드2, 키워드3 형식으로 입력해주세요)" />
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="krds-btns-wrap right">
                <a href="#" class="krds-btn xlarge primary">협업등록요청</a>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!--# include virtual="../../../components/_footer.html" -->
    </div>
  </body>
</html>
