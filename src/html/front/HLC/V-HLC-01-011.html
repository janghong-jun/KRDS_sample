      <div class="modal-content">
        <!-- modal title -->
        <div class="modal-header">
          <h2 id="tit_V-HLC-01-011" class="modal-title">투표 등록</h2>

        <div class="modal-conts">

            <div class="krds-table-wrap row mob-scroll mob-col">

                </caption>
                <colgroup>
                  <col style="width: 12.8rem" />
                  <col />
                </colgroup>
                <tbody>
                  <tr>
                    <th scope="row">투표 제목</th>
                    <td>투표 제목이 출력됩니다.</td>
                  </tr>
                  <tr>
                    <th scope="row">투표 항목</th>
                    <td>
                      <div class="vote-list">
                        <ul>
                          <li>
                            <span class="num">1.</span>
                            <label for="vote01"> 투표 항목 1의 내용이 출력됩니다. </label>
                            <div class="krds-form-chip small">
                              <input type="radio" class="radio" name="rdo_chip" id="vote01" />
                              <label class="krds-form-chip-outline" for="vote01"> 선택 </label>
                            </div>
                          </li>
                          <li>
                            <span class="num">2.</span>
                            <label for="vote02">투표 항목 2의 내용이 출력됩니다.투표 항목 2의 내 용이 출력됩니다. </label>
                            <div class="krds-form-chip small">
                              <input type="radio" class="radio" name="rdo_chip" id="vote02" />
                              <label class="krds-form-chip-outline" for="vote02"> 선택 </label>
                            </div>
                          </li>
                          <li>
                            <span class="num">3.</span>
                            <label for="vote03"> 투표 항목 3의 내용이 출력됩니다. </label>
                            <div class="krds-form-chip small">
                              <input type="radio" class="radio" name="rdo_chip" id="vote03" />
                              <label class="krds-form-chip-outline" for="vote03"> 선택 </label>
                            </div>
                          </li>
                          <li>
                            <span class="num">4.</span>
                            <label for="vote04"> 투표 항목 4의 내용이 출력됩니다. </label>
                            <div class="krds-form-chip small">
                              <input type="radio" class="radio" name="rdo_chip" id="vote04" />
                              <label class="krds-form-chip-outline" for="vote04"> 선택 </label>
                            </div>
                          </li>
                          <li>
                            <span class="num">5.</span>
                            <label for="vote05"> 투표 항목 5의 내용이 출력됩니다. </label>
                            <div class="krds-form-chip small">
                              <input type="radio" class="radio" name="rdo_chip" id="vote05" />
                              <label class="krds-form-chip-outline" for="vote05"> 선택 </label>
                            </div>
                          </li>
