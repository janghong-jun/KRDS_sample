  <section id="V-HLC-03-016" class="krds-modal fade" role="dialog" aria-labelledby="tit_V-HLC-03-016">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <!-- modal title -->
        <div class="modal-header">
          <h2 id="tit_V-HLC-03-016" class="modal-title">문서작성 공동편집 등록</h2>
        </div>
        <!-- //modal title -->
        <!-- modal contents -->
        <div class="modal-conts">
          <div class="conts-area">
            <div class="krds-table-wrap row mob-scroll mob-col">
              <table class="tbl">
                <caption>
                  문서작성 공동편집 등록에 대한 표로 공동작업명, 공동작업 설명, 작업원본파일로 구성되어있다.
                </caption>
                <colgroup>
                  <col style="width: 20%" />
                  <col />
                </colgroup>
                <tbody>
                  <tr>
                    <th scope="row">
                      <label for="input_name" class="krds-label">공동작업명</label>
                    </th>
                    <td>
                      <input type="text" class="krds-input" id="input_name" placeholder="공동작업명을 입력하세요" />
                    </td>
                  </tr>
                  <tr>
                    <th scope="row">
                      <label for="input_cont" class="krds-label">공동작업 설명</label>
                    </th>
                    <td>
                      <textarea class="krds-input" id="input_cont" placeholder="공동작업 설명을 입력하세요"></textarea>
                    </td>
                  </tr>
                  <tr>
                    <th scope="row">
                      <label for="file-upload" class="krds-label">작업원본파일</label>
                    </th>
                    <td>
                      <div class="file-box">
                        <!-- <ul class="file-list">
                          <li>
                            <span class="file-name">
                              <i class="svg-icon ico-pdf"></i>
                              <span>파일명.pdf</span>
                            </span>
                            <button type="button" class="krds-btn icon">
                              <i class="svg-icon ico-delete-fill2"></i>
                              <span class="sr-only">삭제</span>
                            </button>
                          </li>
                        </ul> -->
                        <div class="file-box-btn-wrap">
                          <input type="file" id="file-upload" hidden />
                          <label for="file-upload" class="krds-btn tertiary medium">파일찾기</label>
                        </div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <!-- //modal contents -->
        <!-- modal btn -->
        <div class="modal-btn btn-wrap">
          <button type="button" class="krds-btn medium tertiary close-modal">취소</button>
          <button type="button" class="krds-btn medium primary">등록</button>
        </div>
        <!-- //modal btn -->
        <!-- close button -->
        <button type="button" class="krds-btn medium icon btn-close close-modal">
          <span class="sr-only">닫기</span>
          <i class="svg-icon ico-popup-close"></i>
        </button>
        <!-- //close button -->
