<!DOCTYPE html>
<html lang="ko">
  <head>
    <!--# include virtual="../../components/_admin-head2.html" -->
    <script type="text/javascript">
      pageInfo = { mid: '1' };
    </script>
  </head>

  <body>
    <div class="wrap">
      <header class="gnb-wrap" id="header">
        <div>
          <h1><span class="hide">Hi-Coaching</span></h1>
          <div class="links">
            <button type="button" class="logout">로그아웃</button>
          </div>
        </div>
      </header>
      <main class="main-wrap" id="content">
        <div class="sub-nav"></div>
        <section class="main-conts">
          <h2>관리자 계정관리</h2>
          <div class="tbl-base mgt10">
            <table>
              <colgroup>
                <col style="width: 290px" />
                <col style="width: auto" />
                <col style="width: 290px" />
                <col style="width: auto" />
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">
                    권한 등급<span class="ico-req"
                      ><span class="hide">필수</span></span
                    >
                  </th>
                  <td colspan="3">
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rp01" name="rpBtn" checked="" />
                        <label for="rp01" class="lb-radio"
                          ><span>마스터</span></label
                        >
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rp02" name="rpBtn" />
                        <label for="rp02" class="lb-radio"
                          ><span>슈퍼</span></label
                        >
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rp03" name="rpBtn" />
                        <label for="rp03" class="lb-radio"
                          ><span>교사</span></label
                        >
                      </span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="select01">소속 센터</label
                    ><span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td colspan="3">
                    <div class="frm-area">
                      <select id="select01">
                        <option value="">목동점</option>
                      </select>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp02">이메일</label
                    ><span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" name="" id="inp02" class="inp-text" />
                    </div>
                  </td>
                  <th scope="row">
                    <label for="inp01">이름</label
                    ><span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" name="" id="inp01" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">입사일자</th>
                  <td>
                    <div class="ui-date-wrap full">
                      <div class="ui-datepicker">
                        <input
                          type="text"
                          id="uiDate_1"
                          class="inp-base date"
                          title="날짜입력"
                          readonly=""
                          required=""
                        />
                        <button
                          type="button"
                          class="ui-datepicker-btn"
                          data-target="uiDate_1"
                        >
                          <span class="a11y-hidden">입사일자 선택</span>
                        </button>
                      </div>
                    </div>
                  </td>
                  <th scope="row">퇴사일자</th>
                  <td>
                    <div class="ui-date-wrap full">
                      <div class="ui-datepicker">
                        <input
                          type="text"
                          id="uiDate_2"
                          class="inp-base date"
                          title="날짜입력"
                          readonly=""
                          required=""
                        />
                        <button
                          type="button"
                          class="ui-datepicker-btn"
                          data-target="uiDate_2"
                        >
                          <span class="a11y-hidden">퇴사일자 선택</span>
                        </button>
                      </div>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp03">연락처</label
                    ><span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" name="" id="inp03" class="inp-text" />
                    </div>
                  </td>
                  <th scope="row">
                    사용여부<span class="ico-req"
                      ><span class="hide">필수</span></span
                    >
                  </th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rp01" name="rpBtn4" />
                        <label for="rp01" class="lb-radio"
                          ><span>사용</span></label
                        >
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rp02" name="rpBtn4" />
                        <label for="rp02" class="lb-radio"
                          ><span>미사용</span></label
                        >
                      </span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th><label for="inpUpload">이미지 첨부</label></th>
                  <td colspan="3">
                    <div class="file-wrap">
                      <div class="input-item">
                        <input
                          type="text"
                          name="inpUpload"
                          class="inp-text"
                          value=""
                          placeholder=""
                          readonly
                        />
                        <span class="btn base square">
                          <input
                            type="file"
                            title="첨부파일 선택"
                            id="inpUpload"
                          />
                          <span>파일추가</span>
                        </span>
                      </div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="tbl-btns">
            <button type="button" class="btn base tertiary">
              <span>삭제</span>
            </button>
            <div>
              <button type="button" class="btn base secondary">
                <span>취소</span>
              </button>
              <button type="button" class="btn base primary">
                <span>저장</span>
              </button>
            </div>
          </div>
        </section>
      </main>
      <footer>
        <p>Copyright©2025 Hi-Coaching. All rights reserved</p>
      </footer>
    </div>
  </body>
</html>
