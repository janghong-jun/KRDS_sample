<!doctype html>
<html lang="ko">
  <head>
    <!--# include virtual="../../../components/_admin-head.html" -->
    <script type="text/javascript">
      pageInfo = { mid: '1', sid: '2' };
    </script>
  </head>

  <body>
    <div class="wrap">
      <header class="gnb-wrap" id="header">
        <div>
          <h1><span class="hide">Hi-Coaching</span></h1>
          <div class="links">
            <button type="button" class="logout">로그아웃</button>
          </div>
        </div>
      </header>
      <main class="main-wrap" id="content">
        <div class="sub-nav">
          <button type="button" class="menu">
            <span class="hide">메뉴</span>
          </button>
          <!--# include virtual="../../../components/_admin-lnb.html" -->
        </div>
        <section class="main-conts">
          <h2>관리자 정보</h2>
          <div class="sub-title">
            <p class="msg">* 표시는 필수 입력 항목입니다.</p>
          </div>
          <div class="tbl-base mgt10 align-left">
            <table>
              <colgroup>
                <col style="width: 15rem" />
                <col />
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">
                    <label for="inp01">아이디</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp01" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp02">이름</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp02" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp03">구분</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp03" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp06">휴대폰 번호</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area phone">
                      <div class="lb-item">
                        <input type="text" id="inp06" class="inp-text" />
                      </div>
                      <div class="lb-item">
                        <input
                          type="text"
                          class="inp-text"
                          aria-label="연락처 중간자리"
                        />
                      </div>
                      <div class="lb-item">
                        <input
                          type="text"
                          class="inp-text"
                          aria-label="연락처 끝자리"
                        />
                      </div>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp07">이메일</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area mail-area">
                      <input type="text" id="inp07" class="inp-text" />
                      <span>@</span>
                      <input
                        type="text"
                        class="inp-text"
                        aria-label="도메인 입력"
                      />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row" class="vertical-top">
                    권한관리
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rp01" name="rpBtn" checked />
                        <label for="rp01" class="lb-radio">슈퍼관리자</label>
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rp02" name="rpBtn" />
                        <label for="rp02" class="lb-radio">일반관리자</label>
                      </span>
                    </div>
                    <ul class="authority-list">
                      <li>Depth 1 > Depth 2</li>
                      <li>Depth 1 > Depth 2</li>
                      <li>Depth 1 > Depth 2</li>
                    </ul>
                    <div class="tbl-btns type-small">
                      <button
                        type="button"
                        class="btn base square primary btn-modal"
                        data-id="X-HSM-01-006"
                        data-src="X-HSM-01-006.html"
                      >
                        <span>권한설정</span>
                      </button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    계정상태
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rp03" name="rpBtn02" checked />
                        <label for="rp03" class="lb-radio">사용</label>
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rp04" name="rpBtn02" />
                        <label for="rp04" class="lb-radio">정지</label>
                      </span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">이력</th>
                  <td>
                    <ul>
                      <li>[최초 등록] 권수빈(00129725) 2020-02-28 14:28:30</li>
                      <li>[최종 수정] 김미소(00435591) 2020-03-12 09:10:21</li>
                    </ul>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="tbl-btns">
            <button type="button" class="btn base tertiary">
              <span>삭제</span>
            </button>
            <div>
              <button type="button" class="btn base secondary">
                <span>취소</span>
              </button>
              <button type="button" class="btn base primary">
                <span>수정</span>
              </button>
            </div>
          </div>
        </section>
      </main>
      <footer>
        <p>Copyright©2025 Hi-Coaching. All rights reserved</p>
      </footer>
    </div>
  </body>
</html>
