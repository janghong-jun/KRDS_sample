<!doctype html>
<html lang="ko">
  <head>
    <!--# include virtual="../../../components/_admin-head.html" -->
    <script type="text/javascript">
      pageInfo = { mid: '1', sid: '9' };
    </script>
  </head>

  <body>
    <div class="wrap">
      <header class="gnb-wrap" id="header">
        <div>
          <h1><span class="hide">Hi-Coaching</span></h1>
          <div class="links">
            <button type="button" class="logout">로그아웃</button>
          </div>
        </div>
      </header>
      <main class="main-wrap" id="content">
        <div class="sub-nav">
          <button type="button" class="menu">
            <span class="hide">메뉴</span>
          </button>
          <!--# include virtual="../../../components/_admin-lnb.html" -->
        </div>
        <section class="main-conts">
          <h2>금칙어 관리</h2>
          <div class="sub-title">
            <p class="msg">* 표시는 필수 입력 항목입니다.</p>
          </div>
          <div class="tbl-base mgt10 align-left">
            <table>
              <colgroup>
                <col style="width: 15rem" />
                <col />
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">
                    <label for="select01">금칙어 유형</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <select id="select01">
                        <option>유형선택</option>
                        <option selected>욕설</option>
                        <option>비속어</option>
                        <option>금지단어</option>
                        <option>정치중립위반</option>
                        <option>품위유지 위반</option>
                      </select>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp02">관련금칙어</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <textarea type="text" id="inp02" class="inp-textrea" style="height: 10rem">강아지, 강 아지, 강아 지, 강 아 지, 강아지같은, 강아지스러운, 10강아지, 신난강아지</textarea>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    적용여부
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rdo_03_01" name="rdoBtn03" checked />
                        <label for="rdo_03_01" class="lb-radio">적용</label>
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rdo_03_02" name="rdoBtn03" />
                        <label for="rdo_03_02" class="lb-radio">비적용</label>
                      </span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="tbl-btns">
            <div>
              <button type="button" class="btn base secondary">
                <span>목록</span>
              </button>
              <button type="button" class="btn base primary">
                <span>수정</span>
              </button>
            </div>
          </div>
        </section>
      </main>
      <footer>
        <p>Copyright©2025 Hi-Coaching. All rights reserved</p>
      </footer>
    </div>
  </body>
</html>
