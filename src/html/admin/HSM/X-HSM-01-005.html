        </div>
        <section class="main-conts">
          <h2>관리자 정보</h2>

          </div>
          <div class="tbl-base mgt10 align-left">
            <table>
              <colgroup>
                <col style="width: 15rem" />
                <col />
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">
                    <label for="inp01">아이디</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp01" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp02">이름</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp02" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp03">구분</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp03" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp06">휴대폰 번호</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area phone">
                      <div class="lb-item">
                        <input type="text" id="inp06" class="inp-text" />
                      </div>
                      <div class="lb-item">
                        <input type="text" class="inp-text" aria-label="연락처 중간자리" />
                      </div>
                      <div class="lb-item">
                        <input type="text" class="inp-text" aria-label="연락처 끝자리" />
                      </div>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp07">이메일</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area mail-area">
                      <input type="text" id="inp07" class="inp-text" />
                      <span>@</span>
                      <input type="text" class="inp-text" aria-label="도메인 입력" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="password">비밀번호</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area flex-wrap">
                      <input type="password" id="password" class="inp-text" style="flex: 1" />
                      <div class="tbl-btns mgt0">
                        <button type="button" class="btn base square">
                          <span>비밀번호 초기화</span>
                        </button>
                      </div>
                    </div>
                  </td>
                </tr>

                <tr>
                  <th scope="row">
                    <label for="inp_ip">IP</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp_ip" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row" class="vertical-top">
                    권한관리
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rp01" name="rpBtn" checked />
                        <label for="rp01" class="lb-radio">슈퍼관리자</label>
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rp02" name="rpBtn" />
                        <label for="rp02" class="lb-radio">일반관리자</label>
                      </span>
                    </div>
                    <ul class="authority-list">
                      <li>Depth 1 > Depth 2</li>
                      <li>Depth 1 > Depth 2</li>
                      <li>Depth 1 > Depth 2</li>
                    </ul>
                    <div class="tbl-btns type-small">
                      <button
                        type="button"
                        class="btn base square primary"
                        onClick="
                          UI.modal.show({
                            id: 'X-HSM-01-006',
                            src: 'X-HSM-01-006.html',
                            callback: () => { 
                              const $modal = $('#X-HSM-01-006');
                              const $tree = $modal.find('.tree-area');
                              const $toggleAllBtn = $modal.find('.tbl-btns .btn-all');
                              $tree.find('.active').removeClass('active')
                              $tree.find('> ul > li > div > button').off('click').on('click', function () { 
                                const $btn = $(this);
                                const $wrap = $btn.parent();

                                $btn.toggleClass('active');
                                $wrap.toggleClass('active');
                              });

                              $toggleAllBtn.off('click').on('click', function () { 
                                const $btn = $(this);

                                $btn.toggleClass('expanded');
                                
                                const $depthBtns = $tree.find('> ul > li > div > button');
                                  $depthBtns.addClass('active').parent().addClass('active');
                              });
                            }
                          });"
                      >
                        <span>권한설정</span>
                      </button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    계정상태
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rp03" name="rpBtn02" checked />
                        <label for="rp03" class="lb-radio">사용</label>
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rp04" name="rpBtn02" />
                        <label for="rp04" class="lb-radio">정지</label>
                      </span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="tbl-btns">
            <button type="button" class="btn base tertiary">
              <span>삭제</span>
            </button>
            <div>
              <button type="button" class="btn base secondary">
                <span>목록</span>
              </button>
              <button type="button" class="btn base primary">
                <span>수정</span>
              </button>
            </div>
          </div>
        </section>
      </main>
      <footer>
        <p>Copyright©2025 Hi-Coaching. All rights reserved</p>
      </footer>
