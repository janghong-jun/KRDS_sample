<!doctype html>
<html lang="ko">
  <head>
    <!--# include virtual="../../../components/_admin-head.html" -->
  </head>
  <body>
    <div class="wrap login">
      <section class="admin-login-inner">
        <div class="login-top">
          <h1>LOG-IN</h1>
          <div class="links">
            <div class="logo"><span class="hide">Hi-Coaching</span></div>
          </div>
        </div>
        <div class="login-box">
          <div class="frm-area">
            <input
              type="text"
              placeholder="아이디 입력"
              aria-label="아이디 입력"
            />
          </div>
          <p class="msg error-info">아이디 입력 을(를) 입력해 주세요.</p>
          <div class="frm-area">
            <input
              type="password"
              placeholder="비밀번호 입력"
              aria-label="비밀번호 입력"
            />
          </div>
          <p class="msg error-info">비밀번호 입력 을(를) 입력해 주세요.</p>
          <div class="login-btn">
            <button type="button" class="btn primary">
              <span>관리자 로그인</span>
            </button>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
