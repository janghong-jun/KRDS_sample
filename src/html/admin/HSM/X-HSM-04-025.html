<!doctype html>
<html lang="ko">
  <head>
    <!--# include virtual="../../../components/_admin-head.html" -->
    <script type="text/javascript">
      pageInfo = { mid: '6', sid: '2' };
    </script>
  </head>

  <body>
    <div class="wrap">
      <header class="gnb-wrap" id="header">
        <div>
          <h1>
            <a href="#"><span class="hide">Hi-Coaching</span></a>
          </h1>
          <div class="links"><span>최종로그인일시 : 2026-02-06 10:56:30</span><button type="button" class="logout">로그아웃</button></div>
        </div>
      </header>
      <main class="main-wrap" id="content">
        <div class="sub-nav">
          <button type="button" class="menu">
            <span class="hide">메뉴</span>
          </button>
          <!--# include virtual="../../../components/_admin-lnb.html" -->
        </div>
        <section class="main-conts">
          <h2>공지사항</h2>
          <div class="sub-title">
            <p class="msg">* 표시는 필수 입력 항목입니다.</p>
          </div>
          <div class="tbl-base mgt10 align-left">
            <table>
              <colgroup>
                <col style="width: 15rem" />
                <col />
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">
                    <label for="select01">구분</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area flex">
                      <span class="lb-item flex-none">
                        <select id="select01">
                          <option>구분 전체</option>
                          <option>공지</option>
                          <option>업데이트</option>
                          <option>점검</option>
                        </select>
                      </span>
                      <span class="lb-item">
                        <input type="checkbox" id="chk01" />
                        <label for="chk01" class="lb-checkbox"><span>중요공지 (목록에 표시)</span></label>
                      </span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">중요공지 기간</th>
                  <td>
                    <div class="flex-box align-center">
                      <div class="ui-date-wrap">
                        <div class="ui-datepicker">
                          <input type="text" id="startDate" class="inp-base date" aria-label="날짜입력" readonly placeholder="YYYY-MM-DD" />
                          <button type="button" class="ui-datepicker-btn" data-target="startDate">
                            <span class="a11y-hidden">년월일 선택</span>
                          </button>
                        </div>
                      </div>
                      <span class="date-sep">~</span>
                      <div class="ui-date-wrap">
                        <div class="ui-datepicker">
                          <input type="text" id="endDate" class="inp-base date" aria-label="날짜입력" readonly placeholder="YYYY-MM-DD" />
                          <button type="button" class="ui-datepicker-btn" data-target="endDate">
                            <span class="a11y-hidden">년월일 선택</span>
                          </button>
                        </div>
                      </div>
                      해당 기간 동안 중요공지로 상단 노출됩니다.
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inp01">제목</label>
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <input type="text" id="inp01" class="inp-text" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    내용
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="edit-area">에디터영역</div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    노출여부
                    <span class="ico-req"><span class="hide">필수</span></span>
                  </th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" id="rdo_01_01" name="rdoBtn01" checked />
                        <label for="rdo_01_01" class="lb-radio">노출</label>
                      </span>
                      <span class="lb-item">
                        <input type="radio" id="rdo_01_02" name="rdoBtn01" />
                        <label for="rdo_01_02" class="lb-radio">비노출</label>
                      </span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">
                    <label for="inpUpload">첨부파일</label>
                  </th>
                  <td>
                    <div class="file-wrap">
                      <div class="input-item">
                        <input type="text" name="inpUpload" class="inp-text" readonly aria-label="첨부 파일" />
                        <span class="btn base square">
                          <input type="file" title="첨부파일 선택" id="inpUpload" />
                          <span>찾아보기</span>
                        </span>
                      </div>
                      <div class="file-list mgt8">
                        <span class="file-info">jpg, png, pdf, hwp, docx만 등록 가능 (최대 10MB)</span>
                      </div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="tbl-btns">
            <div>
              <button type="button" class="btn base secondary">
                <span>목록</span>
              </button>
              <button type="button" class="btn base primary">
                <span>등록</span>
              </button>
            </div>
          </div>
        </section>
      </main>
      <footer>
        <p>Copyright©2025 Hi-Coaching. All rights reserved</p>
      </footer>
    </div>
  </body>
</html>
