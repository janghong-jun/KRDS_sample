<!doctype html>
<html lang="ko">
  <head>
    <!--# include virtual="../../../components/_admin-head.html" -->
    <script type="text/javascript">
      pageInfo = { mid: '4', sid: '2' };
    </script>
  </head>

  <body>
    <div class="wrap">
      <header class="gnb-wrap" id="header">
        <div>
          <h1><span class="hide">Hi-Coaching</span></h1>
          <div class="links">
            <button type="button" class="logout">로그아웃</button>
          </div>
        </div>
      </header>
      <main class="main-wrap" id="content">
        <div class="sub-nav">
          <button type="button" class="menu">
            <span class="hide">메뉴</span>
          </button>
          <!--# include virtual="../../../components/_admin-lnb.html" -->
        </div>
        <section class="main-conts">
          <h2>모듈설정</h2>
          <div class="sub-title">
            <h3 class="fc-black">추천기준 설정</h3>
          </div>
          <div class="tbl-base mgt10 align-left">
            <table>
              <colgroup>
                <col style="width: 15rem" />
                <col style="width: calc(50% - 15rem)" />
                <col style="width: 15rem" />
                <col style="width: calc(50% - 15rem)" />
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">역량진단 점수</th>
                  <td colspan="3">
                    <div class="frm-area grid left">
                      <div class="lb-item">
                        <select>
                          <option>교육과정 역량</option>
                        </select>
                        <input type="text" class="inp-text txt-r" />
                        <span class="unit">이하</span>
                      </div>
                      <div class="lb-item">
                        <select>
                          <option>생활교육 역량</option>
                        </select>
                        <input type="text" class="inp-text txt-r" />
                        <span class="unit">이하</span>
                      </div>
                      <div class="lb-item">
                        <select>
                          <option>학교공동체 역량</option>
                        </select>
                        <input type="text" class="inp-text txt-r" />
                        <span class="unit">이하</span>
                      </div>
                      <div class="lb-item">
                        <select>
                          <option>자기개발 역량</option>
                        </select>
                        <input type="text" class="inp-text txt-r" />
                        <span class="unit">이하</span>
                      </div>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">구성 콘텐츠 수</th>
                  <td>
                    <div class="frm-area flex left">
                      <input type="text" class="inp-text txt-r" />
                      <span class="unit">개 이상</span>
                    </div>
                  </td>
                  <th scope="row">총 학습시간</th>
                  <td>
                    <div class="frm-area flex left">
                      <input type="text" class="inp-text txt-r" />
                      <span class="unit">분 이상</span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">태그</th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="radio" name="rdo01" id="rdo0101" />
                        <label for="rdo0101" class="lb-radio">적용</label>
                      </span>
                      <span class="lb-item">
                        <input type="radio" name="rdo01" id="rdo0102" />
                        <label for="rdo0102" class="lb-radio">미적용</label>
                      </span>
                    </div>
                  </td>
                  <th scope="row">평점</th>
                  <td>
                    <div class="frm-area flex left">
                      <input type="text" class="inp-text txt-r" />
                      <span class="unit">이상</span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">대상</th>
                  <td>
                    <div class="frm-area">
                      <span class="lb-item">
                        <input type="checkbox" id="chk01" />
                        <label for="chk01" class="lb-checkbox">전체</label>
                      </span>
                      <span class="lb-item">
                        <input type="checkbox" id="chk02" />
                        <label for="chk02" class="lb-checkbox">초등학교</label>
                      </span>
                      <span class="lb-item">
                        <input type="checkbox" id="chk03" />
                        <label for="chk03" class="lb-checkbox">중학교</label>
                      </span>
                      <span class="lb-item">
                        <input type="checkbox" id="chk04" />
                        <label for="chk04" class="lb-checkbox">고등학교</label>
                      </span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="sub-title">
            <h3 class="fc-black">차단기준 설정</h3>
          </div>
          <div class="tbl-base mgt10 align-left">
            <table>
              <colgroup>
                <col style="width: 15rem" />
                <col style="width: calc(50% - 15rem)" />
                <col style="width: 15rem" />
                <col style="width: calc(50% - 15rem)" />
              </colgroup>
              <tbody>
                <tr>
                  <th scope="row">신고이력 건수</th>
                  <td>
                    <div class="frm-area flex left">
                      <input type="text" class="inp-text txt-r" />
                      <span class="unit">이상</span>
                    </div>
                  </td>
                  <th scope="row">평점</th>
                  <td>
                    <div class="frm-area flex left">
                      <input type="text" class="inp-text txt-r" />
                      <span class="unit">이하</span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="tbl-btns mgt16">
            <div>
              <button type="button" class="btn base primary">
                <span>저장</span>
              </button>
            </div>
          </div>
        </section>
      </main>
      <footer>
        <p>Copyright©2025 Hi-Coaching. All rights reserved</p>
      </footer>
    </div>
  </body>
</html>
