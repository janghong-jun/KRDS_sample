<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../components/_meta.html" -->
    <title>Hi-Coaching</title>
    <!-- 공통 css -->
    <link
      rel="stylesheet"
      href="../../resources/css/plugin/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="../../resources/css/output.css"
      type="text/css"
    />
    <link rel="stylesheet" href="../resources/css/guide.css" type="text/css" />
    <!-- 공통 script -->
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/plugin/echarts.min.js"></script>
    <script src="../../resources/js/component/ui-script.js"></script>
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../components/_skip.html" -->

      <!--# include virtual="../../components/_masthead.html" -->
      <!--# include virtual="../../components/_header.html" -->

      <!-- Container -->
      <div id="container">
        <div class="inner">
          <!-- breadcrumb -->
          <nav
            class="krds-breadcrumb-wrap"
            aria-label="현재 경로"
            id="breadcrumb"
          >
            <ol class="breadcrumb">
              <li class="home"><a href="#" class="txt">홈</a></li>
              <li><a href="#" class="txt">서비스 신청</a></li>
              <li><a href="#" class="txt">서비스 신청2</a></li>
            </ol>
          </nav>
          <!-- /breadcrumb -->
          <div class="guide">
            <div class="form-group">
              <div class="form-tit">
                <label>날짜 선택</label>
              </div>
              <div
                class="form-conts calendar-conts"
                data-calendar-type="single"
              >
                <div class="calendar-input">
                  <input
                    type="text"
                    class="krds-input datepicker"
                    placeholder="YYYY.MM.DD"
                    readonly
                  />
                  <button
                    type="button"
                    class="krds-btn medium icon form-btn-datepicker"
                  >
                    <span class="sr-only">달력 열기</span
                    ><i class="svg-icon ico-calendar"></i>
                  </button>
                </div>
                <div
                  class="krds-calendar-area"
                  data-keyboard-bound="false"
                ></div>
              </div>
            </div>
          </div>

          <div class="guide">
            <div class="form-group">
              <div class="form-tit">
                <label>기간 선택</label>
              </div>
              <div class="form-conts calendar-conts" data-calendar-type="range">
                <div class="calendar-input">
                  <ul class="input-group range">
                    <li>
                      <input
                        class="krds-input datepicker"
                        placeholder="시작일"
                        readonly
                      />
                    </li>
                    <li class="mark">-</li>
                    <li>
                      <input
                        class="krds-input datepicker"
                        placeholder="종료일"
                        readonly
                      />
                    </li>
                  </ul>
                  <button
                    type="button"
                    class="krds-btn medium icon form-btn-datepicker"
                  >
                    <span class="sr-only">달력 열기</span
                    ><i class="svg-icon ico-calendar"></i>
                  </button>
                </div>
                <div
                  class="krds-calendar-area"
                  data-keyboard-bound="false"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- footer -->
      <!--# include virtual="../../components/_footer.html" -->
    </div>
  </body>
</html>
