<!DOCTYPE html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../components/_meta.html" -->
    <title>하이코칭</title>
    <!-- 공통 css -->
    <link
      rel="stylesheet"
      href="../../resources/css/plugin/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="../../resources/css/output.css"
      type="text/css"
    />
    <link rel="stylesheet" href="../resources/css/guide.css" type="text/css" />
    <!-- 공통 script -->
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/plugin/echarts.min.js"></script>
    <script src="../../resources/js/component/ui-script.js"></script>
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../components/_skip.html" -->

      <!--# include virtual="../../components/_masthead.html" -->
      <!--# include virtual="../../components/_header.html" -->

      <!-- Container -->
      <div id="container">
        <div class="inner">
          <!-- breadcrumb -->
          <nav
            class="krds-breadcrumb-wrap"
            aria-label="현재 경로"
            id="breadcrumb"
          >
            <ol class="breadcrumb">
              <li class="home"><a href="#" class="txt">홈</a></li>
              <li><a href="#" class="txt">서비스 신청</a></li>
              <li><a href="#" class="txt">서비스 신청2</a></li>
            </ol>
          </nav>
          <!-- /breadcrumb -->
          <div class="guide">
            <!-- checkbox -->
            <div class="fieldset">
              <div class="form-group">
                <div class="form-conts">
                  <div class="krds-check-area">
                    <div class="krds-form-check">
                      <input type="checkbox" name="chk_1" id="chk_1" />
                      <label for="chk_1">기본</label>
                    </div>
                    <div class="krds-form-check">
                      <input type="checkbox" name="chk_1" id="chk_2" checked />
                      <label for="chk_2">선택됨</label>
                    </div>
                    <div class="krds-form-check">
                      <input type="checkbox" name="chk_1" id="chk_3" disabled />
                      <label for="chk_3">비활성화</label>
                    </div>
                    <div class="krds-form-check">
                      <input
                        type="checkbox"
                        name="chk_1"
                        id="chk_4"
                        disabled
                        checked
                      />
                      <label for="chk_4">선택된 비활성화</label>
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <div class="form-conts">
                  <div class="krds-check-area chk-column">
                    <div class="krds-form-check">
                      <input type="checkbox" id="chk_additional_1" checked />
                      <label for="chk_additional_1">체크박스</label>
                      <div class="krds-form-check-cnt">
                        <p class="krds-form-check-p">
                          부가적인 설명이 들어갑니다.
                        </p>
                      </div>
                    </div>
                    <div class="krds-form-check">
                      <input type="checkbox" id="chk_additional_2" />
                      <label for="chk_additional_2">체크박스</label>
                      <div class="krds-form-check-cnt">
                        <p class="krds-form-check-p">
                          부가적인 설명이 들어갑니다.
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- //checkbox -->
          </div>

          <div class="guide">
            <!-- checkbox -->
            <div class="krds-check-area">
              <div class="krds-form-check medium">
                <input type="checkbox" id="chk_1-2a" />
                <label for="chk_1-2a">사이즈 : medium</label>
                <div class="krds-form-check-cnt">
                  <p class="krds-form-check-p">부가적인 설명이 들어갑니다.</p>
                </div>
              </div>
              <div class="krds-form-check large">
                <input type="checkbox" id="chk_1-3a" />
                <label for="chk_1-3a">사이즈 : large</label>
                <div class="krds-form-check-cnt">
                  <p class="krds-form-check-p">부가적인 설명이 들어갑니다.</p>
                </div>
              </div>
            </div>
            <!-- //checkbox -->
          </div>
          <div class="guide">
            <!-- checkbox -->
            <div class="krds-check-area">
              <div class="krds-form-chip">
                <input type="checkbox" class="checkbox" id="chk_chip_1" />
                <label class="krds-form-chip-outline" for="chk_chip_1"
                  >chip 상태 : default</label
                >
              </div>
              <div class="krds-form-chip">
                <input
                  type="checkbox"
                  class="checkbox"
                  id="chk_chip_2"
                  checked
                />
                <label class="krds-form-chip-outline" for="chk_chip_2"
                  >chip 상태 : checked</label
                >
              </div>
              <div class="krds-form-chip">
                <input
                  type="checkbox"
                  class="checkbox"
                  id="chk_chip_3"
                  disabled
                />
                <label class="krds-form-chip-outline" for="chk_chip_3"
                  >chip 상태 : disabled</label
                >
              </div>
            </div>
            <!-- //checkbox -->
          </div>
        </div>
      </div>

      <!-- footer -->
      <!--# include virtual="../../components/_footer.html" -->
    </div>
  </body>
</html>
