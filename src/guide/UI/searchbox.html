<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../components/_meta.html" -->
    <title>Hi-Coaching</title>
    <!-- 공통 css -->
    <link rel="stylesheet" href="../../resources/css/plugin/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../../resources/css/output.css" type="text/css" />
    <link rel="stylesheet" href="../resources/css/guide.css" type="text/css" />
    <!-- 공통 script -->
    <script src="../../../resources/js/plugin/swiper-bundle.min.js"></script>

      document.addEventListener('DOMContentLoaded', function () {
        GNB.setSelected({
          depth1: 2 + 1,

      });

  <body>
    <div id="wrap">
      <!--# include virtual="../../components/_skip.html" -->

      <!--# include virtual="../../components/_masthead.html" -->
      <!--# include virtual="../../components/_header.html" -->

      <!-- Container -->
      <div id="container">
        <div class="inner">
          <div class="g-search-area colum">
            <div class="search-top-box">
              <div class="form-group">
                <div class="sch-form-wrap">
                  <div class="col date">
                    <div class="col-title">기간</div>
                    <div class="form-date calendar-conts" data-calendar-type="range">
                      <div class="calendar-input">
                        <ul class="input-group range small">
                          <li>
                            <input class="krds-input datepicker small" placeholder="시작일" readonly aria-label="시작일" />
                            <button type="button" class="krds-btn icon form-btn-datepicker small"><span class="sr-only">달력 열기</span><i class="svg-icon ico-calendar" aria-hidden="true"></i></button>
                          </li>
                          <li class="mark small">~</li>
                          <li>
                            <input class="krds-input datepicker small" placeholder="종료일" readonly aria-label="종료일" />
                            <button type="button" class="krds-btn icon form-btn-datepicker small"><span class="sr-only">달력 열기</span><i class="svg-icon ico-calendar" aria-hidden="true"></i></button>
                          </li>
                        </ul>
                      </div>
                      <div class="krds-calendar-area" data-keyboard-bound="false"></div>
                    </div>
                    <div class="krds-btns-wrap">
                      <button type="button" class="krds-btn small secondary">1개월</button>
                      <button type="button" class="krds-btn small secondary">3개월</button>
                      <button type="button" class="krds-btn small secondary">6개월</button>
                      <button type="button" class="krds-btn small secondary">1년</button>
                    </div>
                  </div>
                  <div class="col">
                    <div class="col-title">진단상태</div>
                    <div class="krds-check-area">
                      <div class="krds-form-check large">
                        <input type="radio" name="search_rdo01" id="search_rdo01_01" />
                        <label for="search_rdo01_01">사이즈 : medium</label>
                      </div>
                      <div class="krds-form-check large">
                        <input type="radio" name="search_rdo01" id="search_rdo01_02" />
                        <label for="search_rdo01_02">사이즈 : large</label>
                      </div>
                      <div class="krds-form-check large">
                        <input type="radio" name="search_rdo01" id="search_rdo01_03" />
                        <label for="search_rdo01_03">사이즈 : large</label>
                      </div>
                      <div class="krds-form-check large">
                        <input type="radio" name="search_rdo01" id="search_rdo01_04" />
                        <label for="search_rdo01_04">사이즈 : large</label>
                      </div>
                    </div>
                  </div>
                  <div class="col">
                    <label class="col-title align-center" for="inp-search">검색어</label>
                    <div class="sch-input">
                      <input type="text" class="krds-input small" id="inp-search" />
                      <span class="krds-btn xsmall icon ico-search btn-exec" aria-hidden="true">
                        <i class="svg-icon ico-sch"></i>
                      </span>
                    </div>
                    <button type="button" class="krds-btn small neutral">검색</button>
                    <button type="button" class="krds-btn medium text">
                      초기화
                      <i class="svg-icon ico-reset" aria-hidden="true"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="g-search-area colum">
            <div class="search-top-box">
              <div class="form-group">
                <div class="sch-form-wrap">
                  <div class="col center">
                    <label for="sch-inp" class="col-title align-center">연구회명</label>
                    <div class="sch-input">
                      <input type="text" class="krds-input small" id="sch-inp" />
                      <span class="krds-btn xsmall icon ico-search btn-exec" aria-hidden="true">
                        <i class="svg-icon ico-sch"></i>
                      </span>
                    </div>
                    <button type="button" class="krds-btn small neutral">검색</button>
                    <button type="button" class="krds-btn medium text">
                      초기화
                      <i class="svg-icon ico-reset" aria-hidden="true"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- footer -->
      <!--# include virtual="../../components/_footer.html" -->
    </div>
