<!DOCTYPE html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../components/_meta.html" -->
    <title>하이코칭</title>
    <!-- 공통 css -->
    <link
      rel="stylesheet"
      href="../../resources/css/plugin/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="../../resources/css/output.css"
      type="text/css"
    />
    <!-- 공통 script -->
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/component/ui-script.js"></script>
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../components/_skip.html" -->

      <!--# include virtual="../../components/_masthead.html" -->
      <!--# include virtual="../../components/_header.html" -->

      <!-- Container -->
      <div id="container">
        <!-- visual banner -->
        <div class="main-vban-wrap bg">
          <div class="inner">
            <div class="vb-swiper" style="position: relative">
              <div class="swiper">
                <ul class="swiper-wrapper">
                  <li class="swiper-slide">
                    <div class="in">
                      <div class="text">
                        <p class="tit">타이틀 영역</p>
                        <p class="txt">컨텐츠 영역 컨텐츠 영역</p>
                      </div>
                    </div>
                  </li>
                  <li class="swiper-slide">
                    <div class="in">
                      <div class="text">
                        <p class="tit">타이틀 영역</p>
                        <p class="txt">컨텐츠 영역 컨텐츠 영역</p>
                      </div>
                    </div>
                  </li>
                  <li class="swiper-slide">
                    <div class="in">
                      <div class="text">
                        <p class="tit">타이틀 영역</p>
                        <p class="txt">컨텐츠 영역 컨텐츠 영역</p>
                      </div>
                    </div>
                  </li>
                  <li class="swiper-slide">
                    <div class="in">
                      <div class="text">
                        <p class="tit">타이틀 영역</p>
                        <p class="txt">컨텐츠 영역 컨텐츠 영역</p>
                      </div>
                    </div>
                  </li>
                </ul>
              </div>
              <button type="button" class="swiper-button-prev">
                <span class="sr-only">이전</span>
              </button>
              <button type="button" class="swiper-button-next">
                <span class="sr-only">다음</span>
              </button>
              <div class="swiper-indicator text-center">
                <div class="swiper-pagination"></div>
              </div>
            </div>
          </div>
        </div>
        <!-- //visual banner -->

        <script>
          //비주얼 배너
          const vbSwiper = new Swiper('.vb-swiper .swiper', {
            slidesPerView: 1,
            spaceBetween: 0,
            speed: 400,
            loop: true,
            navigation: {
              nextEl: '.vb-swiper .swiper-button-next',
              prevEl: '.vb-swiper .swiper-button-prev',
            },
            pagination: {
              el: '.vb-swiper .swiper-pagination',
              clickable: true,
            },
          });
        </script>

        <div class="main-d-ban-swiper">
          <div class="swiper">
            <ul class="swiper-wrapper">
              <li class="swiper-slide">
                <div class="text">
                  <p class="cate">서브타이틀</p>
                  <p class="tit">타이틀</p>
                </div>
              </li>
              <li class="swiper-slide">
                <div class="text">
                  <p class="cate">서브타이틀</p>
                  <p class="tit">타이틀</p>
                </div>
              </li>
            </ul>
          </div>
          <div class="swiper-indicator">
            <div class="swiper-pagination"></div>
            <div class="swiper-controller">
              <button type="button" class="swiper-button-play">
                <span class="sr-only">슬라이드 재생</span>
              </button>
              <button type="button" class="swiper-button-stop">
                <span class="sr-only">슬라이드 멈춤</span>
              </button>
            </div>
            <div class="swiper-navigation">
              <button type="button" class="swiper-button-prev">
                <span class="sr-only">이전</span>
              </button>
              <button type="button" class="swiper-button-next">
                <span class="sr-only">다음</span>
              </button>
            </div>
          </div>
        </div>
        <script>
          const eleBanSwiper = new Swiper('.main-d-ban-swiper .swiper', {
            slidesPerView: 1,
            spaceBetween: 16,
            speed: 400,
            loop: true,
            autoplay: {
              delay: 2500,
              disableOnInteraction: false,
              pauseOnMouseEnter: true,
            },
            navigation: {
              nextEl: '.main-d-ban-swiper .swiper-button-next',
              prevEl: '.main-d-ban-swiper .swiper-button-prev',
            },
            pagination: {
              el: '.main-d-ban-swiper .swiper-pagination',
              type: 'fraction',
            },
          });
          const $eleBanSwiperPlay = document.querySelector(
            '.main-d-ban-swiper .swiper-button-play'
          );
          const $eleBanSwiperStop = document.querySelector(
            '.main-d-ban-swiper .swiper-button-stop'
          );

          $eleBanSwiperPlay.style.display = 'none';

          $eleBanSwiperPlay.addEventListener('click', () => {
            eleBanSwiper.autoplay.start();
            $eleBanSwiperStop.style.display = '';
            $eleBanSwiperPlay.style.display = 'none';
          });

          $eleBanSwiperStop.addEventListener('click', () => {
            eleBanSwiper.autoplay.stop();
            $eleBanSwiperStop.style.display = 'none';
            $eleBanSwiperPlay.style.display = '';
          });
        </script>
      </div>

      <!-- footer -->
      <!--# include virtual="../../components/_footer.html" -->
    </div>
  </body>
</html>
