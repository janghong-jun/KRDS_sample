<!DOCTYPE html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../components/_meta.html" -->
    <title>하이코칭</title>
    <!-- 공통 css -->
    <link
      rel="stylesheet"
      href="../../resources/css/plugin/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="../../resources/css/output.css"
      type="text/css"
    />
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../components/_skip.html" -->

      <!--# include virtual="../../components/_masthead.html" -->
      <!--# include virtual="../../components/_header.html" -->

      <!-- Container -->
      <div id="container">
        <div class="inner">
          <!-- breadcrumb -->
          <nav
            class="krds-breadcrumb-wrap"
            aria-label="현재 경로"
            id="breadcrumb"
          >
            <ol class="breadcrumb">
              <li class="home"><a href="#" class="txt">홈</a></li>
              <li><a href="#" class="txt">서비스 신청</a></li>
              <li><a href="#" class="txt">서비스 신청2</a></li>
            </ol>
          </nav>
          <!-- //breadcrumb -->
          <div class="component">
            <!-- button -->
            <button type="button" class="krds-btn">버튼</button>
            <button type="button" class="krds-btn xsmall">x-small 버튼</button>
            <button type="button" class="krds-btn small">small 버튼</button>
            <button type="button" class="krds-btn medium">medium 버튼</button>
            <button type="button" class="krds-btn large">large 버튼</button>
            <button type="button" class="krds-btn xlarge">x-large 버튼</button>
            <button type="button" class="krds-btn primary">
              버튼 : primary
            </button>
            <button type="button" class="krds-btn secondary">
              버튼 : secondary
            </button>
            <button type="button" class="krds-btn tertiary">
              버튼 : tertiary
            </button>
            <button type="button" class="krds-btn icon">
              <span class="sr-only">검색</span>
              <i class="svg-icon ico-sch"></i>
            </button>
            <button type="button" class="krds-btn icon medium">
              <span class="sr-only">입력한 비밀번호 보기</span>
              <i class="svg-icon ico-pw-visible"></i>
            </button>
            <button class="krds-btn icon medium btn-help-exec">
              <span class="sr-only">도움말</span>
              <i class="svg-icon ico-help"></i>
            </button>
            <button type="button" class="krds-btn large icon border">
              <span class="sr-only">새로고침</span>
              <i class="svg-icon ico-refresh"></i>
            </button>
            <button type="button" class="krds-btn large icon border" disabled>
              <span class="sr-only">열기</span>
              <i class="svg-icon ico-angle down"></i>
            </button>
            <button type="button" class="krds-btn small text">
              텍스트 버튼
            </button>
            <button type="button" class="krds-btn xsmall text">
              찜하기 <i class="svg-icon ico-like"></i>
            </button>
            <button type="button" class="krds-btn small text">
              주민등록표초본 <i class="svg-icon ico-angle right"></i>
            </button>
            <button type="button" class="krds-btn medium text">
              검색 <i class="svg-icon ico-sch"></i>
            </button>
            <button type="button" class="krds-btn xlarge text">
              자세히 보기 <i class="svg-icon ico-more"></i>
            </button>
            <button type="button" class="krds-btn text">
              파일다운로드 <i class="svg-icon ico-down"></i>
            </button>
            <button type="button" class="krds-btn text" disabled>
              필터 <i class="svg-icon ico-filter"></i>
            </button>
            <button type="button" class="krds-btn xsmall">
              x-small 버튼
              <i class="svg-icon ico-sch"></i>
            </button>
            <button type="button" class="krds-btn small">
              small 버튼
              <i class="svg-icon ico-sch"></i>
            </button>
            <button type="button" class="krds-btn medium">
              medium 버튼
              <i class="svg-icon ico-sch"></i>
            </button>
            <button type="button" class="krds-btn large">
              large 버튼
              <i class="svg-icon ico-sch"></i>
            </button>
            <button type="button" class="krds-btn xlarge">
              <i class="svg-icon ico-sch"></i>
              x-large 버튼
            </button>
            <!-- //button -->
          </div>
        </div>
      </div>

      <!-- footer -->
      <!--# include virtual="../../components/_footer.html" -->
    </div>

    <!-- 공통 script -->
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/component/ui-script.js"></script>
  </body>
</html>
