<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../components/_meta.html" -->
    <title>Hi-Coaching</title>
    <!-- 공통 css -->
    <link
      rel="stylesheet"
      href="../../resources/css/plugin/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="../../resources/css/output.css"
      type="text/css"
    />
    <link rel="stylesheet" href="../resources/css/guide.css" type="text/css" />
    <!-- 공통 script -->
    <script src="../../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../../resources/js/plugin/echarts.min.js"></script>
    <script src="../../../resources/js/component/ui-script.js"></script>
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../components/_skip.html" -->

      <!--# include virtual="../../components/_masthead.html" -->
      <!--# include virtual="../../components/_header.html" -->

      <!-- Container -->
      <div id="container">
        <div class="inner">
          <div class="guide">
            <!-- toggle switch -->
            <div class="krds-form-toggle-switch">
              <input type="checkbox" id="switch" />
              <label for="switch"
                ><span class="switch-toggle"><i></i></span>switch :
                default</label
              >
            </div>
            <div class="krds-form-toggle-switch">
              <input type="checkbox" id="switch_checked" checked />
              <label for="switch_checked"
                ><span class="switch-toggle"><i></i></span>switch :
                checked</label
              >
            </div>
            <div class="krds-form-toggle-switch">
              <input type="checkbox" id="switch_disabled_1" disabled />
              <label for="switch_disabled_1"
                ><span class="switch-toggle"><i></i></span>switch :
                disabled</label
              >
            </div>
            <div class="krds-form-toggle-switch large">
              <input type="checkbox" id="switch_lg_1" />
              <label for="switch_lg_1"
                ><span class="switch-toggle"><i></i></span>switch size :
                large</label
              >
            </div>
            <div class="krds-form-toggle-switch medium">
              <input type="checkbox" id="switch_lg_md" />
              <label for="switch_lg_md"
                ><span class="switch-toggle"><i></i></span>switch size :
                medium</label
              >
            </div>
            <!-- //toggle switch -->
          </div>
        </div>
      </div>

      <!-- footer -->
      <!--# include virtual="../../components/_footer.html" -->
    </div>
  </body>
</html>
