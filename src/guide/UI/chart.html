<!doctype html>
<html lang="ko">
  <head>
    <!-- 공통 meta -->
    <!--# include virtual="../../components/_meta.html" -->
    <title>Hi-Coaching</title>
    <!-- 공통 css -->
    <link
      rel="stylesheet"
      href="../../resources/css/plugin/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="../../resources/css/output.css"
      type="text/css"
    />
    <link rel="stylesheet" href="../resources/css/guide.css" type="text/css" />
    <!-- 공통 script -->
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/plugin/swiper-bundle.min.js"></script>
    <script src="../../resources/js/plugin/echarts.min.js"></script>
    <script src="../../resources/js/component/ui-script.js"></script>
  </head>
  <body>
    <div id="wrap">
      <!--# include virtual="../../components/_skip.html" -->

      <!--# include virtual="../../components/_masthead.html" -->
      <!--# include virtual="../../components/_header.html" -->

      <!-- Container -->
      <div id="container">
        <div class="inner">
          <!-- chart -->
          <div class="krds-chart">
            <div class="chart type01"></div>
          </div>
          <script>
            function remToPx(rem) {
              return (
                rem *
                parseFloat(getComputedStyle(document.documentElement).fontSize)
              );
            }

            function getChartOption() {
              return {
                legend: {
                  data: ['나의 진단 결과', '연구평가 기준'],
                  textStyle: {
                    fontSize: remToPx(1.5),
                    fontFamily: 'inherit',
                    color: '#1E2124',
                  },
                  bottom: remToPx(5.8),
                  left: 'center',
                  itemGap: remToPx(4.6),
                  itemWidth: remToPx(1.6),
                  itemHeight: remToPx(1.6),
                  icon: 'roundRect',
                },

                radar: {
                  center: ['50%', remToPx(12)],
                  radius: '50%',
                  shape: 'polygon',
                  indicator: [
                    { name: '교수 역량', max: 100 },
                    { name: '자기개발\n역량', max: 100 },
                    { name: '공동체 역량', max: 100 },
                    { name: '생활교육\n역량', max: 100 },
                  ],
                  axisName: {
                    color: '#1E2124',
                    fontSize: remToPx(1.5),
                    fontFamily: 'inherit',
                    lineHeight: remToPx(2.3),
                  },
                  axisLine: {
                    lineStyle: { color: '#CDDAFE', width: 0.8 },
                  },
                  splitLine: {
                    lineStyle: { color: '#CDDAFE', width: 0.8 },
                  },
                  splitArea: { show: false },
                  splitNumber: 3,
                },

                series: [
                  {
                    type: 'radar',
                    symbolSize: 0,
                    data: [
                      {
                        name: '나의 진단 결과',
                        value: [68.1, 71.9, 66.5, 73.8],
                        lineStyle: { color: '#2563eb', width: 1.5 },
                        areaStyle: { color: '#2563eb', opacity: 0.15 },
                        label: {
                          show: true,
                          color: '#2563eb',
                          fontSize: remToPx(1),
                          fontFamily: 'inherit',
                          formatter: '{c}',
                          position: 'outside',
                          padding: remToPx(0.5),
                        },
                        itemStyle: { color: '#2563eb' },
                      },
                      {
                        name: '연구평가 기준',
                        value: [72.1, 70.8, 71.6, 70.4],
                        lineStyle: { color: '#ffb114', width: 1.5 },
                        areaStyle: { color: '#ffb114', opacity: 0.15 },
                        label: { show: false },
                        itemStyle: { color: '#ffb114' },
                      },
                    ],
                  },
                ],
              };
            }

            const chartDom = document.querySelector('.chart.type01');
            const myChart = echarts.init(chartDom, null, { renderer: 'svg' });

            function renderChart() {
              myChart.setOption(getChartOption(), true);
              myChart.resize();
            }

            renderChart();

            const ro = new ResizeObserver(() => {
              renderChart();
            });

            ro.observe(chartDom);

            window.addEventListener('resize', renderChart);
          </script>
        </div>
      </div>

      <!-- footer -->
      <!--# include virtual="../../components/_footer.html" -->
    </div>
  </body>
</html>
