
      <div class="calendar-wrap ${isRange ? 'range' : 'single'}" tabindex="0">
        <div class="calendar-body">
          <div class="calendar-table-wrap">
            <table class="calendar-tbl">
              <tbody>
                ${Array.from({ length: 30 })
                  .map(
                    (_, i) => `
                  <td data-date="2025.01.${String(i + 1).padStart(2, '0')}">
                    <button type="button" class="btn-set-date">${i + 1}</button>
                  </td>`
                  )
                  .join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="calendar-footer">
          <div class="calendar-btn-wrap">
            <button type="button" class="krds-btn small text "btn-today" >오늘</button>
            <button type="button" class="krds-btn small tertiary">취소</button>
            <button type="button" class="krds-btn small primary btn-confirm">확인</button>
          </div>
        </div>
      </div>
